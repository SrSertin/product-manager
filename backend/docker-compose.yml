services:
  postgres:
    image: postgres:16-alpine
    container_name: backoffice-postgres
    environment:
      POSTGRES_DB: backoffice
      POSTGRES_USER: backoffice
      POSTGRES_PASSWORD: backoffice
    ports:
      - "5432:5432"
    volumes:
      - backoffice_pgdata:/var/lib/postgresql/data

volumes:
  backoffice_pgdata:
